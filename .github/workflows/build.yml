name: Build Garmin App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q curl unzip java-common

      - name: Install Connect IQ SDK Manager (AppImage)
        run: |
          curl -Ls https://raw.githubusercontent.com/pcolby/connectiq-sdk-manager/main/install.sh | bash -r
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download SDK via SDK Manager
        run: |
          sdkmanager install 4.2.4
          echo "$HOME/.Garmin/ConnectIQ/Sdks/connectiq-sdk-4.2.4/bin" >> $GITHUB_PATH

      - name: Fix project structure
        run: |
          mkdir -p source resources
          for f in *.mc; do [ -f "$f" ] && mv "$f" source/; done
          for f in strings.xml settings.xml; do [ -f "$f" ] && mv "$f" resources/; done
          echo "=== source/ ===" && ls source/
          echo "=== resources/ ===" && ls resources/

      - name: Write developer key
        run: |
          echo "${{ secrets.DEVELOPER_KEY }}" | base64 -d > developer_key.der

      - name: Compile .prg
        run: |
          monkeyc \
            -f monkey.jungle \
            -o BodyTempGraph.prg \
            -y developer_key.der \
            -d fenix8 \
            --warn
          ls -lh BodyTempGraph.prg

      - name: Upload .prg artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyTempGraph-fenix8
          path: BodyTempGraph.prg
          retention-days: 30
